name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# One CI run per ref at a time: Dependabot merge trains land several pushes
# within seconds (4 within 16s on 2026-07-16) and each got a full 8-job run.
# Superseded runs are cancelled; only the newest commit on the ref is tested.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, lint, test and build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install ruff
      - run: ruff check src tests

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true   # advisory until the codebase is fully typed
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Mypy (advisory)
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: mypy src

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true   # non-blocking advisory scan
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: pip-audit (advisory)
        run: pip-audit

  django-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Check for missing migrations
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings
        run: python src/manage.py makemigrations --check --dry-run

  deploy-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, django-migrations]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: manage.py check --deploy (production settings)
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings
          DJANGO_DEBUG: "false"
          # A 50+ char key so security.W009 does not warn; not a real secret.
          DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key-0123456789-abcdefghij"
          DJANGO_ALLOWED_HOSTS: "example.com"
        run: python src/manage.py check --deploy --fail-level WARNING

  # Smoke-test the GitHub Pages publish path on every PR: run the exact command
  # pages.yml runs (offline, seeded data) and verify the site renders end-to-end,
  # so a template/service regression can't first surface after merge. Also keeps
  # repo Markdown free of raw Liquid tags ({% ... %}), which crash GitHub's
  # branch-mode Jekyll builder if Pages is ever set to "Deploy from a branch".
  static-site-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, django-migrations]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Markdown is Liquid-safe (no raw {% ... %} tags)
        # -e PATTERN -- keeps the pattern/option split unambiguous on any grep
        # (with plain 'PATTERN --', POSIX-mode grep reads -- as a filename and
        # the check silently passes).
        run: |
          if git ls-files '*.md' | xargs -r grep -nE -e '\{%' --; then
            echo "::error::Raw Liquid tags in Markdown break GitHub's branch-mode Jekyll" \
                 "build — spell template tags without braces in docs."
            exit 1
          fi
      - name: Build the static site offline (same command as pages.yml)
        working-directory: src
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python manage.py migrate --noinput
          python - <<'EOF'
          import django, datetime, decimal, os
          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "config.settings_test")
          django.setup()
          from warehouse.models import Company, Fact, Filing
          co = Company.objects.create(cik="0000320193", ticker="AAPL", name="Apple Inc.")
          Fact.objects.create(company=co, taxonomy="us-gaap", concept="Revenues",
                              value=decimal.Decimal("383285000000"),
                              period_start=datetime.date(2023, 1, 1),
                              period_end=datetime.date(2023, 12, 31))
          Filing.objects.create(company=co, accession_number="0000320193-23-000001",
                                form_type="10-K", filing_date=datetime.date(2023, 12, 31))
          EOF
          python manage.py publish_static_site --skip-sync --tickers AAPL \
            --output "$GITHUB_WORKSPACE/_site_smoke" \
            --base-url "https://example.github.io/fredgar-ai"
      - name: Verify rendered output
        run: |
          for f in index.html about.html sitemap.xml .nojekyll \
                   companies/0000320193/index.html companies.json; do
            test -f "_site_smoke/$f" || { echo "::error::missing _site_smoke/$f"; exit 1; }
          done

  test-sqlite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, django-migrations]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Django system check
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: python src/manage.py check
      - name: Pytest with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: |
          pytest \
            --cov=warehouse --cov=config --cov=sec_edgar --cov=public_data \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=50
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  test-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, django-migrations]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_fredgar
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d test_fredgar"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_fredgar
      PYTHONPATH: ${{ github.workspace }}/src
      DJANGO_SETTINGS_MODULE: config.settings_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python src/manage.py migrate --noinput
      - run: |
          pytest -q \
            --cov=warehouse --cov=config --cov=sec_edgar --cov=public_data \
            --cov=api \
            --cov-fail-under=50
